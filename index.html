<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>現品票・品番ラベル 突合</title>

<style>
body{
font-family:sans-serif;
background:#eef2f7;
margin:0;
}

header{
background:#111827;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
}

main{
max-width:520px;
margin:auto;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
margin-top:6px;
font-size:16px;
}

input{
width:100%;
padding:12px;
font-size:20px;
}

.status{
padding:10px;
font-size:26px;
font-weight:bold;
text-align:center;
}

.blue{background:#dbeafe;}
.green{background:#dcfce7;}
.red{background:#fee2e2;}

.log{
background:black;
color:#eee;
padding:10px;
height:120px;
overflow:auto;
font-size:12px;
}
</style>
</head>

<body>

<header>現品票・品番ラベル 突合</header>

<main>

<div class="card">

<button id="btnFocus">入力欄へフォーカス</button>
<button id="btnReset">最初に戻す</button>

<input
id="scanInput"
type="text"
inputmode="latin"
autocomplete="off"
autocapitalize="characters"
spellcheck="false"
/>

</div>

<div id="statusCard" class="status blue">
1回目待機
</div>

<div class="card">
<div>1回目データ</div>
<div id="firstParsed">-</div>

<div>2回目データ</div>
<div id="secondParsed">-</div>
</div>

<div class="card">
<div>ログ</div>
<div id="log" class="log">ready</div>
</div>

</main>

<script>

const scanInput=document.getElementById("scanInput")
const statusCard=document.getElementById("statusCard")
const firstParsed=document.getElementById("firstParsed")
const secondParsed=document.getElementById("secondParsed")
const log=document.getElementById("log")

let stage=1
let firstCode=""
let firstQty=""

function addLog(t){

const d=new Date()
const ts=d.toLocaleTimeString()

log.textContent+=`\n${ts} ${t}`
log.scrollTop=log.scrollHeight
}

function normalizeText(str){

return String(str)

.replace(/\r/g,"")
.replace(/\n/g,"")

.replace(/\.+/g," ")       // ← . を空白に変換
.replace(/\s+/g," ")       // ← 空白整理

.trim()
.toUpperCase()
}

function parseFirst(raw){

const txt=normalizeText(raw)

const m=txt.match(/^([A-Z0-9]{10,12})\s+([0-9]+)$/)

if(!m){
return null
}

return{
code:m[1],
qty:m[2]
}
}

function parseSecond(raw){

const txt=normalizeText(raw)

if(!/^[A-Z0-9]{10,12}$/.test(txt)){
return null
}

return txt
}

function reset(){

stage=1
firstCode=""
firstQty=""

scanInput.value=""
firstParsed.textContent="-"
secondParsed.textContent="-"

statusCard.className="status blue"
statusCard.textContent="1回目待機"

addLog("reset")

scanInput.focus()
}

function firstScan(){

const raw=scanInput.value

const parsed=parseFirst(raw)

if(!parsed){

statusCard.className="status red"
statusCard.textContent="1回目エラー"

addLog("1回目形式エラー")

scanInput.select()
return
}

firstCode=parsed.code
firstQty=parsed.qty

firstParsed.textContent=`${firstCode} / ${firstQty}`

statusCard.className="status blue"
statusCard.textContent="2回目待機"

scanInput.value=""
stage=2

addLog("1回目OK")
}

function secondScan(){

const raw=scanInput.value

const code=parseSecond(raw)

if(!code){

statusCard.className="status red"
statusCard.textContent="2回目エラー"

addLog("2回目形式エラー")

scanInput.select()
return
}

secondParsed.textContent=code

if(code===firstCode){

statusCard.className="status green"
statusCard.textContent="一致"

addLog("一致")

}else{

statusCard.className="status red"
statusCard.textContent="不一致"

addLog("不一致")
}

stage=3
scanInput.blur()
}

scanInput.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

e.preventDefault()

if(stage===1){
firstScan()
}
else if(stage===2){
secondScan()
}

}

})

document.getElementById("btnReset").onclick=reset
document.getElementById("btnFocus").onclick=()=>scanInput.focus()

reset()

</script>

</body>
</html>
